app = "cucilab-whatsapp-bot"
primary_region = "sin"

[build]

[env]
  PORT = "3001"
  DB_PATH = "/data/cucilab.db"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 3001
    timeout = "5s"
    type = "http"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "cucilab_data"
  destination = "/data"
